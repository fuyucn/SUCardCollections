<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Orange gradient (sunset) -->
    <linearGradient id="grad-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8c3a"/>
      <stop offset="100%" style="stop-color:#ff7a17"/>
    </linearGradient>
    <!-- Purple gradient (dusk) -->
    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b5de5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Dark background rounded square -->
  <rect width="32" height="32" rx="5" fill="#0a0a0a"/>

  <!-- Top-left card: orange -->
  <rect x="2" y="2" width="20" height="20" rx="3" fill="url(#grad-orange)" opacity="0.92"/>

  <!-- Bottom-right card: purple, offset -->
  <rect x="10" y="10" width="20" height="20" rx="3" fill="url(#grad-purple)" opacity="0.92"/>

  <!-- Diamond gem in center of overlap -->
  <polygon points="16,9 20,16 16,23 12,16" fill="white" opacity="0.95"/>
</svg>
